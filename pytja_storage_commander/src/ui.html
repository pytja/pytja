<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pytja Storage Commander</title>
    <style>
        :root {
            --bg-dark: #0f1115;
            --bg-panel: #1a1d24;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --border: #334155;
            --success: #10b981;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Navigation */
        #sidebar {
            width: 250px;
            background-color: var(--bg-panel);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .nav-header {
            padding: 20px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--border);
        }

        .nav-item {
            padding: 15px 20px;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            border-left: 3px solid transparent;
        }

        .nav-item:hover {
            background-color: rgba(255, 255, 255, 0.05);
        }

        .nav-item.active {
            background-color: rgba(59, 130, 246, 0.1);
            border-left-color: var(--accent);
            color: var(--accent);
        }

        /* Main Content Area */
        #content {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }

        .header {
            margin-bottom: 30px;
        }

        .header h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 500;
        }

        /* Dashboard Grid */
        .grid-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background-color: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
        }

        .card-title {
            color: var(--text-muted);
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .card-value {
            font-size: 28px;
            font-weight: 600;
        }

        .card-value.green { color: var(--success); }
        .card-value.blue { color: var(--accent); }

        /* VFS Placeholder */
        #vfs-view {
            display: none;
        }

        .placeholder-text {
            color: var(--text-muted);
            font-style: italic;
        }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="nav-header">Pytja Commander</div>
    <div class="nav-item active" onclick="switchView('db')">Database Fleet</div>
    <div class="nav-item" onclick="switchView('vfs')">Zero-Trust VFS</div>
</div>

<div id="content">
    <div id="db-view">
        <div class="header">
            <h1>Database Monitor</h1>
        </div>

        <div class="grid-cards">
            <div class="card">
                <div class="card-title">Total Fleet Storage</div>
                <div class="card-value blue" id="val-storage">-- GB</div>
            </div>
            <div class="card">
                <div class="card-title">Active Connections</div>
                <div class="card-value" id="val-connections">--</div>
            </div>
            <div class="card">
                <div class="card-title">System Health</div>
                <div class="card-value green" id="val-health">Online</div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">Attached Instances</div>
            <div class="placeholder-text" style="margin-top: 10px;">
                Awaiting telemetry data from host...
            </div>
        </div>
    </div>

    <div id="vfs-view">
        <div class="header">
            <h1>File Explorer</h1>
        </div>
        <div class="card">
            <div class="placeholder-text">VFS Module initializing...</div>
        </div>
    </div>
</div>

<script>
    // Simple View Router
    function switchView(view) {
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        event.currentTarget.classList.add('active');

        document.getElementById('db-view').style.display = view === 'db' ? 'block' : 'none';
        document.getElementById('vfs-view').style.display = view === 'vfs' ? 'block' : 'none';
    }

    // IPC Event Listener (Empfängt Daten vom Rust-Plugin)
    window.addEventListener('message', (event) => {
        // Hier werden wir später die Daten vom Host verarbeiten
        console.log("Received data:", event.data);
    });

    window.addEventListener('pytja_host_event', (event) => {
        const data = event.detail;
        if (data.type === 'stats_update') {
            document.getElementById('val-storage').textContent = data.storage;
            document.getElementById('val-connections').textContent = data.connections;
            document.getElementById('val-health').textContent = data.health;
        }
    });
</script>
</body>
</html>
