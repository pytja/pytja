syntax = "proto3";
package pytja;

// Der Service definiert, was der Server kann
service PytjaService {
    rpc Ping (PingRequest) returns (PingResponse);
    rpc ListDirectory (ListRequest) returns (ListResponse);
    rpc CreateNode (CreateNodeRequest) returns (ActionResponse);
    rpc ReadFile (ReadFileRequest) returns (ReadFileResponse);
    rpc DeleteNode (DeleteNodeRequest) returns (ActionResponse);
    rpc MoveNode (MoveNodeRequest) returns (ActionResponse);
    rpc CopyNode (CopyNodeRequest) returns (ActionResponse);
    rpc ChangeMode (ChangeModeRequest) returns (ActionResponse);
    rpc ChownNode (ChownRequest) returns (ActionResponse);
    rpc LockNode (LockRequest) returns (ActionResponse); // Für lock UND unlock
    rpc GetUsage (UsageRequest) returns (UsageResponse); // du / quota
    rpc FindNode (FindRequest) returns (FindResponse);
    rpc GrepNode (GrepRequest) returns (GrepResponse);
    rpc StatNode (StatRequest) returns (StatResponse); // Für cd (Prüfen ob Ordner existiert)
    rpc GetTree (TreeRequest) returns (TreeResponse);
    rpc UploadFile (stream UploadRequest) returns (ActionResponse);
    rpc DownloadFile (DownloadRequest) returns (stream FileChunk);
    rpc ExecScript (ExecRequest) returns (stream ExecResponse);
    rpc GetChallenge (ChallengeRequest) returns (ChallengeResponse); // Schritt 1
    rpc Login (LoginRequest) returns (LoginResponse); // Schritt
    rpc KickUser (KickUserRequest) returns (ActionResponse);
    rpc CreateRole (CreateRoleRequest) returns (AdminActionResponse);
    rpc AddPermission (AddPermissionRequest) returns (AdminActionResponse);
    rpc AssignRole (AssignRoleRequest) returns (AdminActionResponse);
    rpc ListRoles (ListRolesRequest) returns (ListRolesResponse);
    rpc GetActiveSessions (GetSessionsRequest) returns (GetSessionsResponse);
    rpc BanUser (BanUserRequest) returns (BanUserResponse);
    rpc ChangeUserRole (ChangeRoleRequest) returns (ChangeRoleResponse);
    rpc GetMounts (GetMountsRequest) returns (GetMountsResponse);
    rpc AddMount (AddMountRequest) returns (AdminActionResponse);
    rpc RemoveMount (RemoveMountRequest) returns (AdminActionResponse);
    rpc ListUsers(ListUsersRequest) returns (ListUsersResponse);
    rpc RegisterUser(RegisterUserRequest) returns (RegisterUserResponse);
    rpc SetUserQuota(SetQuotaRequest) returns (SetQuotaResponse);
    rpc GetSystemStats(SystemStatsRequest) returns (SystemStatsResponse);
    rpc GetAuditLogs(GetAuditLogsRequest) returns (GetAuditLogsResponse);
    rpc StreamServerLogs(LogStreamRequest) returns (stream LogStreamEntry);
    rpc GenerateInviteCode (GenerateInviteRequest) returns (GenerateInviteResponse);
    rpc RevokeInviteCode (RevokeInviteRequest) returns (AdminActionResponse);
    rpc ListInviteCodes (ListInvitesRequest) returns (ListInvitesResponse);
    rpc ReadFileChunk (ReadChunkRequest) returns (ReadChunkResponse);
    rpc QueryMetadata (QueryMetadataRequest) returns (ListResponse);
}

// --- Messages (Datenpakete) ---

message PingRequest {
    string message = 1;
}

message PingResponse {
    string message = 1;
    string server_version = 2;
    bool is_ready = 3;
}

message ListRequest {
    string path = 1;
    string auth_token = 2;
}

message FileInfo {
    string name = 1;
    bool is_folder = 2;
    uint64 size = 3;
    string owner = 4;
    uint32 permissions = 5;
    double created_at = 6;
}
message ListResponse {
    repeated FileInfo files = 1;
}

message CreateNodeRequest {
    string path = 1;
    bool is_folder = 2;
    bytes content = 3;
    string lock_password = 4;
    string owner = 5;
}

message ActionResponse {
    bool success = 1;
    string message = 2;
}

message ReadFileRequest {
    string path = 1;
    string password = 2; // Falls die Datei gelockt ist
}

message ReadFileResponse {
    bool success = 1;
    bytes content = 2;
    string message = 3; // Fehlermeldung falls access denied
}

message DeleteNodeRequest {
    string path = 1;
}

message MoveNodeRequest {
    string source_path = 1;
    string dest_path = 2;
}

message CopyNodeRequest {
    string source_path = 1;
    string dest_path = 2;
    string owner = 3; // Der neue Owner der Kopie
}

message ChangeModeRequest {
    string path = 1;
    uint32 permissions = 2; // 0, 1, 2
}

message ChownRequest {
    string path = 1;
    string new_owner = 2;
}

message LockRequest {
    string path = 1;
    string password = 2; // Leer = Unlock
}

message UsageRequest {
    string owner = 1;
}

message UsageResponse {
    uint64 bytes = 1;
}

message FindRequest {
    string pattern = 1; // z.B. "*.txt"
}

message FindResponse {
    repeated string paths = 1;
}

message GrepRequest {
    string pattern = 1; // Das Wort, das wir suchen
}

message GrepResponse {
    repeated string matches = 1; // Liste der Dateien, die das Wort enthalten
}

message StatRequest {
    string path = 1;
}

message StatResponse {
    bool exists = 1;
    bool is_folder = 2;
    bool is_locked = 3; // Damit cd nach Passwort fragen kann
}

message TreeRequest {
    string root_path = 1; // Wo soll der Baum starten? (meistens "/")
}

message TreeResponse {
    string tree_output = 1; // Der Server sendet den fertigen Text-Baum
}

// --- STREAMING MESSAGES ---

message UploadRequest {
    // oneof spart Platz: Entweder Metadaten ODER Daten-Chunk
    oneof data {
        FileMetadata metadata = 1;
        bytes chunk = 2;
    }
}

message FileMetadata {
    string path = 1;
    string lock_password = 2;
    string owner = 3;
    bool is_folder = 4; // Falls wir rekursiv hochladen (erstmal false)
    optional string metadata = 5; // NEU: Unsere JSON Metadaten!
}

message DownloadRequest {
    string path = 1;
    string password = 2;
}

message FileChunk {
    bytes content = 1; // Ein Teil der Datei
}

message ExecRequest {
    string script_path = 1;
    repeated string args = 2;
}

message ExecResponse {
    string output_line = 1; // Eine Zeile Output (stdout/stderr)
}

// 1. Client fragt: "Gib mir eine Aufgabe!"
message ChallengeRequest {
    string username = 1;
}

// 2. Server antwortet: "Hier ist dein Zufallswert."
message ChallengeResponse {
    string challenge = 1; // Hex String (32 bytes random)
    bool user_exists = 2;
}

// 3. Client antwortet: "Hier ist meine Unterschrift für den Zufallswert."
message LoginRequest {
    string username = 1;
    string challenge = 2; // Die Aufgabe, die wir bekommen haben
    string signature = 3; // Die Lösung (Signatur der Challenge)
}

// 4. Server antwortet: "Korrekt. Hier ist dein Session-Token."
message LoginResponse {
    bool success = 1;
    string token = 2; // Das JWT Token
    string message = 3;
}

message SessionInfo {
    string session_id = 1;
    string username = 2;
    string ip_address = 3;
    int32 role_level = 4; // Muss int32 bleiben! (Feld 4)
    string login_time = 5;
    string last_activity = 6;
    string role = 7;      // NEU: String Rolle (Feld 7)
}

message GetSessionsRequest {
    // Leer lassen für alle, oder filtern
}

message GetSessionsResponse {
    repeated SessionInfo sessions = 1;
    int32 total_active = 2;
}

message KickUserRequest {
    string session_id = 1;
    string reason = 2;
}

// --- RBAC MANAGEMENT (ADMIN ONLY) ---

message CreateRoleRequest {
    string name = 1;
}

message AddPermissionRequest {
    string role_name = 1;
    string permission = 2; // z.B. "core:fs:write" oder "chat:send"
}

message AssignRoleRequest {
    string username = 1;
    string role_name = 2;
}

message AdminActionResponse {
    bool success = 1;
    string message = 2;
}

message ListRolesRequest {}

message RoleInfo {
    string name = 1;
    repeated string permissions = 2;
}

message ListRolesResponse {
    repeated RoleInfo roles = 1;
}

message BanUserRequest {
    string username = 1;
    bool ban = 2; // true = ban, false = unban
    string reason = 3;
}

message BanUserResponse {
    bool success = 1;
    string message = 2;
}

message ChangeRoleRequest {
    string username = 1;
    string new_role = 2;
}

message ChangeRoleResponse {
    bool success = 1;
    string message = 2;
}

// Datenbanken / Mounts
message MountInfo {
    string name = 1;        // z.B. "primary", "archive"
    string type = 2;        // "sqlite", "postgres", "s3"
    string connection = 3;  // Der Pfad oder URL (maskiert)
    bool is_connected = 4;
}

message GetMountsRequest {}
message GetMountsResponse {
    repeated MountInfo mounts = 1;
}

message AddMountRequest {
    string name = 1;
    string type = 2;
    string connection_string = 3;
}

message RemoveMountRequest {
    string name = 1;
}

// --- USER MANAGEMENT MESSAGES ---

message UserData {
    string username = 1;
    string role = 2;
    bool is_active = 3;
    uint64 quota_used = 4;   // Aktueller Verbrauch
    uint64 quota_limit = 5;  // Individuelles Limit (0 = Default)
    string created_at = 6;
}

message ListUsersRequest {}
message ListUsersResponse {
    repeated UserData users = 1;
}

message RegisterUserResponse {
    bool success = 1;
    string message = 2;
}

message SetQuotaRequest {
    string username = 1;
    uint64 limit_bytes = 2;
}
message SetQuotaResponse {
    bool success = 1;
    string message = 2;
}

// --- SYSTEM & AUDIT MESSAGES ---

message SystemStatsRequest {}
message SystemStatsResponse {
    double cpu_usage_percent = 1;
    uint64 memory_usage_bytes = 2;
    uint64 active_sessions = 3;
    uint64 active_uploads = 4;
    string uptime = 5;
    bool redis_connected = 6;
}

message GetAuditLogsRequest {
    uint32 limit = 1; // z.B. die letzten 50 Einträge
    string filter_user = 2; // Optional
}

message AuditLogEntry {
    string timestamp = 1;
    string user = 2;
    string action = 3;
    string target = 4;
}

message GetAuditLogsResponse {
    repeated AuditLogEntry logs = 1;
}

// Live Log Stream
message LogStreamRequest {}
message LogStreamEntry {
    string level = 1; // "INFO", "WARN", "ERROR"
    string message = 2;
    string timestamp = 3;
}

// --- INVITE SYSTEM MESSAGES ---

message RegisterUserRequest {
    string username = 1;
    bytes public_key = 2; // PEM oder Raw Bytes
    string role = 3; // Wird ignoriert, wenn invite_code genutzt wird
    uint64 quota_limit = 4;
    string invite_code = 5; // NEU: Der Schlüssel zum Server
}

message GenerateInviteRequest {
    string role = 1; // z.B. "guest", "user", "admin"
    uint32 max_uses = 2; // Wie oft darf der Code genutzt werden? (0 = unendlich)
    uint64 quota_limit = 3; // Optionales Limit in Bytes für neue User
}

message GenerateInviteResponse {
    bool success = 1;
    string code = 2; // z.B. "PYTJA-GUEST-A1B2"
    string message = 3;
}

message RevokeInviteRequest {
    string code = 1;
}

message InviteCodeInfo {
    string code = 1;
    string role = 2;
    uint32 max_uses = 3;
    uint32 used_count = 4;
    string created_by = 5;
    string created_at = 6;
}

message ListInvitesRequest {}

message ListInvitesResponse {
    repeated InviteCodeInfo invites = 1;
}

// (Füge das ganz unten in die Datei ein)
message ReadChunkRequest {
    string path = 1;
    uint64 offset = 2;
    uint32 chunk_size = 3;
    optional string password = 4;
}

message ReadChunkResponse {
    bytes chunk = 1;
    bool is_eof = 2;
}

message QueryMetadataRequest {
    string query = 1;
}